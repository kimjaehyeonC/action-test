name: Convert Zpln to ipynb

on:
  push:
    paths:
    - '**.zpln'

jobs:
  modify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 저장소 가져오기
      uses: actions/checkout@v4
    
    - name: zpln → ipynb 변환
      run: |
        find . -name "*.zpln" | while read zpln_file; do
          ipynb_file="ipynb/${zpln_file#./}"
          ipynb_file="${ipynb_file%.zpln}.ipynb"
          python3 scripts/convert_zpln.py "$zpln_file" "$ipynb_file"
        done

    - name: 변경사항 커밋 & 푸시
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        if git diff --cached --quiet; then
          echo "변경사항 없음, 스킵"
        else
          git commit -m "auto: zpln→ipynb 변환 [skip ci]"
          git pull --rebase
          git push
        fi