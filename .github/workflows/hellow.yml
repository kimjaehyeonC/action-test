name: Hello Action

on:
  push:
    paths:
    - '**.ipynb'

jobs:
  modify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 저장소 가져오기
      run: python3 scripts/convert_test.py
      
    - name: 변경사항 커밋 & 푸시
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git diff --cached --quiet || git commit -m "auto: Action이 셀 추가함 [skip ci]"
        git push
        
